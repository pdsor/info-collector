name: "钛媒体 - 数据要素相关文章"
version: "1.0.0"
description: "从钛媒体官网抓取数据要素相关文章列表，适合追踪数据行业动态、政策解读、应用案例"

source:
  platform: "tmtpost"
  type: "html"  # 直接 HTML 页面抓取，无需 JS 渲染
  url: "https://www.tmtpost.com/"
  auth:
    type: "none"

render:
  enabled: false  # 页面为 SSR，内容已在 HTML 中

list:
  # 钛媒体列表页文章链接在 <a class="_tit type-post" href="..."> 中
  # 实际通过页面内 JavaScript 渲染，但 HTML 中已含部分结构
  items_path: "//a[contains(@class, 'type-post')]"
  fields:
    - name: "title"
      type: "attr"
      path: "//a[contains(@class, 'type-post')]"
      attr: "text"
    - name: "url"
      type: "attr"
      path: "//a[contains(@class, 'type-post')]"
      attr: "href"
    - name: "platform"
      type: "constant"
      value: "钛媒体"
    - name: "publish_time"
      type: "computed"
      # 钛媒体文章列表页时间格式为相对时间如"3小时前"，需二次采集详情页获取绝对时间
      value: null
    - name: "company"
      type: "computed"
      value: null  # 列表页无公司字段，需进入详情页
    - name: "clue_type"
      type: "computed"
      value: "policy"  # 默认归类为政策/行业动态
    - name: "summary"
      type: "computed"
      value: null  # 列表页无摘要，需进入详情页

detail:
  # 进入文章详情页，提取完整信息
  enabled: true
  fields:
    - name: "title"
      type: "xpath"
      path: "//h1[contains(@class, 'article-title')]//text()"
    - name: "publish_time"
      type: "xpath"
      path: "//span[contains(@class, 'time')]//text()"
    - name: "author"
      type: "xpath"
      path: "//span[contains(@class, 'author-name')]//text()"
    - name: "content"
      type: "xpath"
      path: "//div[contains(@class, 'article-content')]//text()"
      transform: "strip_html,trim"
    - name: "tags"
      type: "xpath"
      path: "//a[contains(@class, 'tag-item')]//text()"

dedup:
  incremental: true
  id_template: "tmtpost_{url_hash}"
  # 从 URL 提取文章 ID

output:
  format: "json"
  path: "./output/tmtpost/"
  filename_template: "tmtpost_data_articles_{date}.json"

alert:
  on_failure: true
  retry_times: 3
