name: "钛媒体 - 数据要素相关文章"
subject: "数据要素"
version: "1.0.2"
description: "从钛媒体官网抓取数据要素相关文章列表，适合追踪数据行业动态、政策解读、应用案例"
enabled: true

source:
  platform: "tmtpost"
  type: "html"
  client: auto
  subject: "数据要素"
  url: "https://www.tmtpost.com/"
  auth:
    type: "none"

render:
  enabled: false  # SSR页面，HTML中已有内容

list:
  # 正则：捕获 <a class="...item...type-post..." href="URL">...<img alt="TITLE">...
  items_path: 'regex:<a[^>]*class="[^"]*item[^"]*type-post[^"]*"[^>]*href="([^"]+)"[^>]*>.*?<img[^>]*alt="([^"]+)"[^>]*>'
  fields:
    - name: "title"
      type: "element_text"  # 从parse_items返回的title字段获取
    - name: "url"
      type: "element_href"  # 从parse_items返回的href字段获取
    - name: "platform"
      type: "constant"
      value: "钛媒体"
    - name: "publish_time"
      type: "constant"
      value: null
    - name: "company"
      type: "constant"
      value: null
    - name: "clue_type"
      type: "constant"
      value: "policy"
    - name: "summary"
      type: "constant"
      value: null

detail:
  enabled: false  # 列表页已有标题和URL，可直接使用

dedup:
  incremental: true
  id_template: "tmtpost_{article_id}"
  url_to_id_pattern: "tmtpost\\.com/(\\d+)\\.html"

output:
  format: "json"
  filename_template: "tmtpost_data_articles_{date}.json"

alert:
  on_failure: true
  retry_times: 3
