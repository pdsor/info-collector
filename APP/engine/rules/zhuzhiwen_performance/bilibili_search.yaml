name: "Bilibili - 朱之文相关视频"
subject: "大衣哥朱之文演出"
version: "1.0.0"
description: "在B站（哔哩哔哩）搜索大衣哥朱之文相关视频，很多视频标题/简介中包含演出地点信息"
enabled: true

source:
  platform: "bilibili"
  type: "html"
  client: auto
  subject: "大衣哥朱之文演出"
  url: "https://search.bilibili.com/all?keyword=%E7%9A%AE%E4%B9%8B%E6%96%87%E6%BC%94%E5%87%BA&order=totalrank&duration=0&tids_1=0"

request:
  method: "GET"
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
    Accept-Language: "zh-CN,zh;q=0.9"
    Referer: "https://www.bilibili.com/"

list:
  # B站搜索结果列表：视频标题+链接
  items_path: 'regex:<a[^>]*class="[^"]*title[^"]*"[^>]*href="([^"]+)"[^>]*title="([^"]+)"[^>]*>'
  fields:
    - name: "title"
      type: "element_text"
    - name: "url"
      type: "element_href"
    - name: "platform"
      type: "constant"
      value: "哔哩哔哩"
    - name: "source"
      type: "constant"
      value: "B站视频"
    - name: "event_type"
      type: "constant"
      value: "视频内容"
    - name: "publish_time"
      type: "constant"
      value: null
    - name: "location"
      type: "constant"
      value: null

dedup:
  incremental: true
  id_template: "bilibili_{md5}"
  url_to_id_pattern: "video/([^?]+)"

output:
  format: "json"
  filename_template: "bilibili_zhuzhiwen_{date}.json"

alert:
  on_failure: true
  retry_times: 3
