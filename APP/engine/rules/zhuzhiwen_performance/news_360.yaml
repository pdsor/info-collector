name: "360搜索 - 朱之文演出新闻"
subject: "大衣哥朱之文演出"
version: "1.0.0"
description: "通过360搜索(nsone.net)抓取朱之文演出相关新闻报道"
enabled: true

source:
  platform: "360news"
  type: "html"
  client: auto
  subject: "大衣哥朱之文演出"
  url: "https://www.so.com/s?q=%E6%9C%B1%E4%B9%8B%E6%96%87%E6%BC%94%E5%87%BA&pn=1&rn=20"

request:
  method: "GET"
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    Accept: "text/html,application/xhtml+xml"
    Accept-Language: "zh-CN,zh;q=0.9"
    Referer: "https://www.so.com/"

list:
  # 360搜索结果结构: <li><h3 class="res-title"><a href="跳转URL">标题<em>关键词</em>等</a>
  # 关键: h3和a之间可能有空格；标题内含<em>标签用(.*?)匹配；href前有空格
  items_path: 'regex:<h3[^>]*class="res-title"[^>]*>\s*<a[^>]+href="([^"]+)"[^>]*>(.*?)</a>'
  fields:
    - name: "title"
      type: "element_text"
    - name: "url"
      type: "element_href"
    - name: "platform"
      type: "constant"
      value: "新闻媒体"
    - name: "source"
      type: "constant"
      value: "360搜索"
    - name: "event_type"
      type: "constant"
      value: "新闻报道"
    - name: "publish_time"
      type: "constant"
      value: null
    - name: "location"
      type: "constant"
      value: null

pagination:
  enabled: true
  page_param: "pn"
  max_pages: 3

dedup:
  incremental: true
  id_template: "360_{md5}"
  url_to_id_pattern: "https?://([^/]+)"

output:
  format: "json"
  filename_template: "news_360_zhuzhiwen_{date}.json"

alert:
  on_failure: true
  retry_times: 3
